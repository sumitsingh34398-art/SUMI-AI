<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay" id="overlay"onclick="closeSidebar()"></div>

<div class="app">
    <div class="sidebar" id="sidebar">
        <h2>SUMI AI</h2>
    
        <button onclick="newChat()">💬 New Chat</button>
    
        <div class="menu-item">🕘 Chat History</div>
        <div class="menu-item">⚙️ Settings</div>
        <div class="menu-item">🌙 Dark Mode</div>
        <div class="menu-item">👤 Profile</div>
        <div class="menu-item">📄 Export Chat</div>
        <div class="menu-item">🔒 Privacy</div>
    
        <button onclick="logout()">🚪 Logout</button>
    
        <div id="history-list"></div>
    </div>

    <div class="top-bar">
        <span id="menu-btn" onclick="toggleSidebar()">☰</span>
        <h2>SUMI AI</h2>
        <span>⚙️</span>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="bot-message">🤖 Hello 👋 I am Sumi AI</div>
    </div>

    <div class="input-area">
        <label for="file-upload" id="attach-btn">📎</label>
<input type="file" id="file-upload" hidden>
        <input type="text" id="user-input" placeholder="Type message...">
        <button onclick="sendMessage()">➤</button>
        <button onclick="startVoice()">🎤</button>
    </div>

</div>

<script src="script.js"></script>
<script type="module" src="firebase.js"></script>
<div id="overlay"
onclick="closeSidebar()"></div>
</body>
</html>
